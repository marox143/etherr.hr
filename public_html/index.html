<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        var supported = { hr: true, en: true, de: true };
        var lang = "";
        try {
          lang = window.localStorage.getItem("etherr-language") || "";
        } catch (_error) {}
        if (!supported[lang]) {
          var cookies = String(document.cookie || "").split(";");
          for (var i = 0; i < cookies.length; i += 1) {
            var parts = cookies[i].split("=");
            if (String(parts[0] || "").trim() !== "etherr-language") {
              continue;
            }
            lang = decodeURIComponent(parts.slice(1).join("=").trim());
            break;
          }
        }
        if (supported[lang]) {
          window.ETHERR_BOOT_LANG = lang;
          document.documentElement.lang = lang;
        }
      })();
    </script>
    <title>Etherr</title>
    <meta name="description" content="" />
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="home">
    <div class="floating-grid" id="floatingGrid" aria-hidden="true">
      <canvas class="network-canvas" id="networkCanvas" aria-hidden="true"></canvas>
    </div>

    <header class="site-header" id="top" data-shared-header></header>

    <main>
      <section class="hero section">
        <div class="hero-cloud-layer" aria-hidden="true">
          <span class="hero-cloud hero-cloud-primary"></span>
          <span class="hero-cloud hero-cloud-secondary"></span>
        </div>

        <div class="container hero-grid">
          <div class="hero-content reveal">
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="#contact" data-i18n="hero.primaryCta"></a>
              <a class="btn btn-secondary" href="#services" data-i18n="hero.secondaryCta"></a>
            </div>
          </div>

          <div class="hero-art reveal" aria-hidden="true">
            <div class="hero-logo-mark">
              <img src="assets/images/logo.png" alt="" width="220" height="220" />
            </div>
          </div>
        </div>
      </section>

      <section class="services section" id="services">
        <div class="container">
          <div class="section-intro reveal">
            <p class="section-tag" data-i18n="services.tag"></p>
            <h2 data-i18n="services.title"></h2>
            <p class="section-note" data-i18n="services.intro"></p>
          </div>

          <div class="service-categories" id="serviceCategories"></div>
        </div>
      </section>

      <section class="contact section" id="contact">
        <div class="container">
          <div class="contact-card contact-intake-card reveal">
            <div class="contact-intake-layout">
              <div class="contact-intake-aside">
                <p class="section-tag" data-i18n="contact.tag"></p>
                <h2 data-i18n="contact.title"></h2>
                <p class="section-note" data-i18n="contact.text"></p>
                <ul class="contact-intake-highlights">
                  <li data-i18n="contact.intake.point1"></li>
                  <li data-i18n="contact.intake.point2"></li>
                  <li data-i18n="contact.intake.point3"></li>
                </ul>
                <div class="contact-links">
                  <a class="contact-link" href="tel:+385916309013">+385 91 6309 013</a>
                  <a class="contact-link" href="mailto:info@etherr.hr">info@etherr.hr</a>
                </div>
              </div>

              <form class="contact-intake-form" id="contactIntakeForm" novalidate>
                <div class="contact-intake-progress">
                  <div class="contact-intake-progress-track" aria-hidden="true">
                    <span data-contact-progress-fill></span>
                  </div>
                  <p class="contact-intake-progress-text" data-contact-progress-text></p>
                </div>

                <section class="contact-intake-step is-active" data-contact-step="0">
                  <h3 data-i18n="contact.intake.step1Title"></h3>
                  <p data-i18n="contact.intake.step1Text"></p>
                  <div class="contact-service-grid" data-contact-service-options></div>
                </section>

                <section class="contact-intake-step" data-contact-step="1" hidden>
                  <h3 data-i18n="contact.intake.step2Title"></h3>
                  <p data-i18n="contact.intake.step2Text"></p>
                  <div class="contact-choice-group">
                    <p class="contact-choice-label" data-i18n="contact.intake.projectTypeLabel"></p>
                    <div class="contact-choice-grid">
                      <label class="contact-choice-option">
                        <input type="radio" name="projectType" value="new" data-contact-choice />
                        <span data-i18n="contact.intake.projectType.new"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="projectType" value="upgrade" data-contact-choice />
                        <span data-i18n="contact.intake.projectType.upgrade"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="projectType" value="automation" data-contact-choice />
                        <span data-i18n="contact.intake.projectType.automation"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="projectType" value="notSure" data-contact-choice />
                        <span data-i18n="contact.intake.projectType.notSure"></span>
                      </label>
                    </div>
                  </div>

                  <div class="contact-choice-group">
                    <p class="contact-choice-label" data-i18n="contact.intake.timelineLabel"></p>
                    <div class="contact-choice-grid contact-choice-grid-compact">
                      <label class="contact-choice-option">
                        <input type="radio" name="timeline" value="asap" data-contact-choice />
                        <span data-i18n="contact.intake.timeline.asap"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="timeline" value="month" data-contact-choice />
                        <span data-i18n="contact.intake.timeline.month"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="timeline" value="quarter" data-contact-choice />
                        <span data-i18n="contact.intake.timeline.quarter"></span>
                      </label>
                      <label class="contact-choice-option">
                        <input type="radio" name="timeline" value="planning" data-contact-choice />
                        <span data-i18n="contact.intake.timeline.planning"></span>
                      </label>
                    </div>
                  </div>
                </section>

                <section class="contact-intake-step" data-contact-step="2" hidden>
                  <h3 data-i18n="contact.intake.step3Title"></h3>
                  <p data-i18n="contact.intake.step3Text"></p>
                  <div class="contact-field-grid">
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.company"></span>
                      <input type="text" data-contact-field="company" autocomplete="organization" required />
                    </label>
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.website"></span>
                      <input type="url" data-contact-field="website" autocomplete="url" />
                    </label>
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.name"></span>
                      <input type="text" data-contact-field="contactName" autocomplete="name" required />
                    </label>
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.email"></span>
                      <input type="email" data-contact-field="email" autocomplete="email" required />
                    </label>
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.phone"></span>
                      <input type="tel" data-contact-field="phone" autocomplete="tel" />
                    </label>
                    <label class="contact-field">
                      <span data-i18n="contact.intake.fields.contactMethod"></span>
                      <select data-contact-field="preferredContact">
                        <option value="email" data-i18n="contact.intake.contactMethod.email"></option>
                        <option value="phone" data-i18n="contact.intake.contactMethod.phone"></option>
                        <option value="video" data-i18n="contact.intake.contactMethod.video"></option>
                      </select>
                    </label>
                  </div>
                </section>

                <section class="contact-intake-step" data-contact-step="3" hidden>
                  <h3 data-i18n="contact.intake.step4Title"></h3>
                  <p data-i18n="contact.intake.step4Text"></p>
                  <label class="contact-field contact-field-textarea">
                    <span data-i18n="contact.intake.fields.details"></span>
                    <textarea rows="5" data-contact-field="details" required></textarea>
                  </label>
                  <div class="contact-turnstile-wrap" data-contact-turnstile-wrap hidden>
                    <p class="contact-choice-label" data-i18n="contact.intake.fields.securityCheck"></p>
                    <div class="contact-turnstile" data-contact-turnstile></div>
                  </div>
                  <label class="contact-consent">
                    <input type="checkbox" data-contact-field="consent" />
                    <span class="contact-consent-copy">
                      <span data-i18n="contact.intake.consent"></span>
                      <span data-i18n="contact.intake.privacyLead"></span>
                      <a class="contact-inline-link" href="/privacy.html" data-i18n="footer.privacyLink"></a>.
                    </span>
                  </label>
                  <input type="hidden" data-contact-field="turnstileToken" />
                  <input type="hidden" id="form_time" name="form_time" data-contact-field="formTimeMs" value="0" />
                  <input
                    class="contact-honeypot"
                    type="text"
                    data-contact-field="botField"
                    name="company"
                    tabindex="-1"
                    autocomplete="off"
                    style="position:absolute; left:-9999px; opacity:0; height:0; width:0;"
                    aria-hidden="true"
                  />
                </section>

                <section class="contact-intake-step" data-contact-step="4" hidden>
                  <h3 data-i18n="contact.intake.step5Title"></h3>
                  <p data-i18n="contact.intake.step5Text"></p>
                  <div class="contact-intake-summary" data-contact-summary></div>
                </section>

                <div class="contact-intake-actions">
                  <button class="contact-intake-btn contact-intake-btn-ghost" type="button" data-contact-back></button>
                  <button class="contact-intake-btn contact-intake-btn-primary" type="button" data-contact-next></button>
                  <button class="contact-intake-btn contact-intake-btn-primary" type="submit" data-contact-submit hidden></button>
                </div>

                <p class="contact-intake-status" data-contact-status aria-live="polite"></p>
                <a class="contact-intake-fallback" data-contact-fallback href="#" hidden></a>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-signature">
          <p class="footer-copyline">
            <span data-footer-copy></span>
            <span class="footer-divider" aria-hidden="true">·</span>
            <a class="footer-inline-link" href="/privacy.html" data-i18n="footer.privacyLink"></a>
          </p>
        </div>
      </div>
    </footer>

    <script>
      window.ETHERR_CONTACT_CONFIG = {
        // Set this only in production when Turnstile is configured.
        turnstileSiteKey: "",
        requireTurnstile: false,
      };
    </script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
    <script src="shared-header.js"></script>
    <script src="script.js"></script>
  </body>
</html>
