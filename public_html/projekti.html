    <script>
      (function () {
        var search = "";
        var debugEnabled = false;
        try {
          search = String(window.location.search || "");
          debugEnabled =
            /(?:^|[?&])debug-mobile=1(?:&|$)/.test(search) ||
            window.localStorage.getItem("etherr-debug-mobile") === "1";
        } catch (_error) {}

        if (!debugEnabled) {
          return;
        }

        var script = document.createElement("script");
        script.src = "debug-archive/error-logger.js";
        document.head.appendChild(script);
      })();
    </script>

    <script>
      (function () {
        var supported = { hr: true, en: true, de: true };
        var lang = "";
        try {
          lang = window.localStorage.getItem("etherr-language") || "";
        } catch (_error) {}
        if (!supported[lang]) {
          var cookies = String(document.cookie || "").split(";");
          for (var i = 0; i < cookies.length; i += 1) {
            var parts = cookies[i].split("=");
            if (String(parts[0] || "").trim() !== "etherr-language") {
              continue;
            }
            lang = decodeURIComponent(parts.slice(1).join("=").trim());
            break;
          }
        }
        if (supported[lang]) {
          window.ETHERR_BOOT_LANG = lang;
          document.documentElement.lang = lang;
        }
      })();
    </script>
