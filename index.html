<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Etherr</title>
    <meta name="description" content="" />
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="home">
    <div class="floating-grid" id="floatingGrid" aria-hidden="true">
      <canvas class="network-canvas" id="networkCanvas" aria-hidden="true"></canvas>
    </div>

    <header class="site-header" id="top" data-shared-header></header>

    <main>
      <section class="hero section">
        <div class="hero-cloud-layer" aria-hidden="true">
          <span class="hero-cloud hero-cloud-primary"></span>
          <span class="hero-cloud hero-cloud-secondary"></span>
        </div>

        <div class="container hero-grid">
          <div class="hero-content reveal">
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
            <div class="hero-actions">
              <a class="btn btn-primary" href="#contact" data-i18n="hero.primaryCta"></a>
              <a class="btn btn-secondary" href="#services" data-i18n="hero.secondaryCta"></a>
            </div>
          </div>

          <div class="hero-art reveal" aria-hidden="true">
            <div class="hero-logo-mark">
              <img src="assets/images/logo.png" alt="" width="220" height="220" />
            </div>
          </div>
        </div>
      </section>

      <section class="services section" id="services">
        <div class="container">
          <div class="section-intro reveal">
            <p class="section-tag" data-i18n="services.tag"></p>
            <h2 data-i18n="services.title"></h2>
            <p class="section-note" data-i18n="services.intro"></p>
          </div>

          <div class="service-categories" id="serviceCategories"></div>
        </div>
      </section>

      <section class="contact section" id="contact">
        <div class="container">
          <div class="contact-card reveal">
            <p class="section-tag" data-i18n="contact.tag"></p>
            <h2 data-i18n="contact.title"></h2>
            <p class="section-note" data-i18n="contact.text"></p>
            <div class="contact-links">
              <a class="contact-link" href="tel:+385916309013">+385 91 6309 013</a>
              <a class="contact-link" href="mailto:info@etherr.hr">info@etherr.hr</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-signature">
          <a class="footer-brand" href="#top" aria-label="Etherr">
            <img src="assets/images/logo.png" alt="Etherr logo" width="28" height="28" />
          </a>
          <p data-footer-copy></p>
        </div>
      </div>
    </footer>

    <script src="shared-header.js"></script>
    <script src="script.js"></script>
  </body>
</html>
